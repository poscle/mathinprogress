<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <img src="mip_logo.png" style="width:300px;">  <title>MathInProgress</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; color: #2563eb; }
    h1 { font-size: 2.2rem; font-weight: 300; letter-spacing: -0.03em; color: #111; }
    p { font-size: 0.95rem; color: #666; max-width: 36ch; line-height: 1.7; }
    .dot { display: inline-block; width: 6px; height: 6px; background: #2563eb; border-radius: 50%; margin: 0 3px; animation: pulse 1.4s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="logo">MathInProgress</div>
  <h1>Something's coming.</h1>
  <p>A math platform built for the curious. Launching soon.</p>
  <div>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
</body>
</html>
